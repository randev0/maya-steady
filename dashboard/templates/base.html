<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}LeadQualBot{% endblock %} — Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="h-full" x-data="{ sidebarOpen: false }">

<div class="min-h-full">

  <!-- Mobile backdrop overlay -->
  <div x-show="sidebarOpen"
       x-cloak
       @click="sidebarOpen = false"
       class="fixed inset-0 z-20 bg-black/50 md:hidden"></div>

  <!-- Sidebar -->
  <nav class="fixed inset-y-0 left-0 z-30 w-56 bg-gray-900 flex flex-col
              transition-transform duration-200 ease-in-out
              -translate-x-full md:translate-x-0"
       :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'">

    <!-- Logo -->
    <div class="flex items-center h-16 px-4 border-b border-gray-700 shrink-0">
      <span class="text-white font-bold text-lg tracking-tight">⚡ LeadQualBot</span>
    </div>

    <!-- Nav links -->
    <div class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">

      <a href="/" @click="sidebarOpen = false"
         class="nav-item {% if active_page == 'overview' %}bg-gray-800 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}
                group flex items-center px-3 py-2 rounded-md text-sm font-medium transition">
        <svg class="mr-3 h-5 w-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Overview
      </a>

      <a href="/conversations" @click="sidebarOpen = false"
         class="nav-item {% if active_page == 'conversations' %}bg-gray-800 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}
                group flex items-center px-3 py-2 rounded-md text-sm font-medium transition">
        <svg class="mr-3 h-5 w-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
        Conversations
      </a>

      <a href="/leads" @click="sidebarOpen = false"
         class="nav-item {% if active_page == 'leads' %}bg-gray-800 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}
                group flex items-center px-3 py-2 rounded-md text-sm font-medium transition">
        <svg class="mr-3 h-5 w-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Leads
      </a>

      <a href="/handoffs" @click="sidebarOpen = false"
         class="nav-item {% if active_page == 'handoffs' %}bg-gray-800 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}
                group flex items-center px-3 py-2 rounded-md text-sm font-medium transition">
        <svg class="mr-3 h-5 w-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
        Handoffs
      </a>

      <a href="/learning" @click="sidebarOpen = false"
         class="nav-item {% if active_page == 'learning' %}bg-gray-800 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}
                group flex items-center px-3 py-2 rounded-md text-sm font-medium transition">
        <svg class="mr-3 h-5 w-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
        </svg>
        Learning
      </a>

      <a href="/dashboard/analytics" @click="sidebarOpen = false"
         class="nav-item {% if active_page == 'analytics' %}bg-gray-800 text-white{% else %}text-gray-300 hover:bg-gray-700 hover:text-white{% endif %}
                group flex items-center px-3 py-2 rounded-md text-sm font-medium transition">
        <svg class="mr-3 h-5 w-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        Analytics
      </a>

    </div>

    <!-- Footer link -->
    <div class="px-4 py-3 border-t border-gray-700 shrink-0">
      <a href="/api/chat" target="_blank" class="text-xs text-gray-400 hover:text-white">
        📡 API Docs
      </a>
    </div>
  </nav>

  <!-- Main content -->
  <div class="md:pl-56 flex flex-col min-h-screen">
    <!-- Top header (mobile hamburger lives here) -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
      <div class="px-4 py-4 flex items-center gap-3">
        <!-- Hamburger button — mobile only -->
        <button @click="sidebarOpen = !sidebarOpen"
                class="md:hidden p-1 -ml-1 rounded-md text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition"
                aria-label="Toggle menu">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <h1 class="text-xl font-semibold text-gray-900">{% block heading %}Dashboard{% endblock %}</h1>
      </div>
    </header>

    <main class="px-4 py-6 md:px-6 flex-1">
      {% block content %}{% endblock %}
    </main>
  </div>

</div>

{% block scripts %}{% endblock %}
</body>
</html>
